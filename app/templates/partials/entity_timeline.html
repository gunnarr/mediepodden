<div class="entity-timeline-content">
    <div class="entity-timeline-header">
        <strong>{{ query }}</strong> &mdash; {{ total_mentions }} omn&auml;mnanden i {{ episode_count }} avsnitt
        <button type="button" class="timeline-close" onclick="document.getElementById('entity-timeline').innerHTML=''">&times;</button>
    </div>
    {% if timeline %}
    <div class="timeline-bars">
        {% for ep in range(1, max_episode + 1) %}
        {% set hits = timeline.get(ep, 0) %}
        <button
            type="button"
            class="timeline-bar{% if hits > 0 %} timeline-bar-hit{% endif %}"
            {% if hits > 0 %}style="--bar-height: {{ [hits / max_hits * 100, 10]|max }}%"{% endif %}
            {% if hits > 0 %}onclick="window.location.href='/?q={{ query | urlencode }}&avsnitt={{ ep }}'"{% endif %}
            title="Avsnitt {{ ep }}{% if hits > 0 %} ({{ hits }} omn&auml;mnande{{ 'n' if hits > 1 else '' }}){% endif %}"
            aria-label="Avsnitt {{ ep }}, {{ hits }} tr&auml;ffar"
        ></button>
        {% endfor %}
    </div>
    {% endif %}
    <a href="/?q={{ query | urlencode }}" class="entity-timeline-link">S&ouml;k efter {{ query }} &rarr;</a>
</div>
