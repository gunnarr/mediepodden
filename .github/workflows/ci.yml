name: Test & Deploy

# Triggers on push to main — runs tests, then deploys via git pull
on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Pull and restart
        run: |
          ssh ${{ secrets.DEPLOY_SERVER }} "
            cd /home/mediepodden/mediepodden
            git pull --ff-only origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo /usr/bin/systemctl restart mediepodden
          "

      - name: Healthcheck
        run: |
          sleep 3
          for i in $(seq 1 10); do
            if curl -sf --max-time 5 https://mediepodden.gunnar.se/health; then
              echo ""
              echo "Healthcheck OK"
              exit 0
            fi
            sleep 2
          done
          echo "Healthcheck failed"
          exit 1

      - name: Smoke test
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://mediepodden.gunnar.se/?q=mediepodden")
          if [ "$status" = "200" ]; then
            echo "Smoke test OK (search returned 200)"
          else
            echo "Smoke test FAILED (HTTP $status)"
            exit 1
          fi
